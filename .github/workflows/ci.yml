name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONTENT_TOKEN }}
          GITHUB_OWNER: ${{ vars.GH_OWNER }}
          GITHUB_REPO: ${{ vars.GH_REPO }}
          GITHUB_DEFAULT_BRANCH: main
          ANTHROPIC_API_KEY: placeholder-for-build
          STUDIO_USERS: ci:team
          STUDIO_PASSWORD: placeholder
          AUTH_SECRET: placeholder-secret-for-build-only
