<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="80" r="140" fill="#2563eb" opacity="0.06"/>
  <circle cx="120" cy="520" r="100" fill="#2563eb" opacity="0.06"/>
  <circle cx="400" cy="300" r="220" fill="#2563eb" opacity="0.03"/>

  <!-- Grid dots -->
  <g fill="#2563eb" opacity="0.15">
    <circle cx="80"  cy="80"  r="2.5"/><circle cx="160" cy="80"  r="2.5"/>
    <circle cx="240" cy="80"  r="2.5"/><circle cx="320" cy="80"  r="2.5"/>
    <circle cx="80"  cy="160" r="2.5"/><circle cx="160" cy="160" r="2.5"/>
    <circle cx="240" cy="160" r="2.5"/><circle cx="320" cy="160" r="2.5"/>
    <circle cx="80"  cy="240" r="2.5"/><circle cx="160" cy="240" r="2.5"/>
    <circle cx="240" cy="240" r="2.5"/><circle cx="320" cy="240" r="2.5"/>
  </g>

  <!-- Central composition: abstract cards -->
  <!-- Card shadow -->
  <rect x="218" y="168" width="364" height="240" rx="16" fill="#2563eb" opacity="0.08"/>
  <!-- Main card -->
  <rect x="210" y="160" width="364" height="240" rx="16" fill="white"/>
  <!-- Card header bar -->
  <rect x="210" y="160" width="364" height="56" rx="16" fill="#2563eb"/>
  <rect x="210" y="192" width="364" height="24" fill="#2563eb"/>
  <!-- Dots in header -->
  <circle cx="242" cy="188" r="7" fill="white" opacity="0.35"/>
  <circle cx="266" cy="188" r="7" fill="white" opacity="0.35"/>
  <circle cx="290" cy="188" r="7" fill="white" opacity="0.35"/>
  <!-- Content lines -->
  <rect x="242" y="236" width="200" height="10" rx="5" fill="#dbeafe"/>
  <rect x="242" y="256" width="150" height="10" rx="5" fill="#dbeafe"/>
  <rect x="242" y="276" width="180" height="10" rx="5" fill="#dbeafe"/>
  <rect x="242" y="296" width="120" height="10" rx="5" fill="#dbeafe"/>
  <!-- CTA button in card -->
  <rect x="242" y="330" width="110" height="36" rx="8" fill="#2563eb"/>
  <rect x="366" y="330" width="80"  height="36" rx="8" fill="#dbeafe"/>

  <!-- Floating accent cards -->
  <rect x="82" y="230" width="112" height="80" rx="10" fill="white" opacity="0.85"/>
  <rect x="88"  y="244" width="60" height="8"  rx="4" fill="#2563eb" opacity="0.4"/>
  <rect x="88"  y="260" width="96" height="6"  rx="3" fill="#dbeafe"/>
  <rect x="88"  y="274" width="76" height="6"  rx="3" fill="#dbeafe"/>
  <rect x="88"  y="288" width="56" height="16" rx="5" fill="#2563eb" opacity="0.15"/>

  <rect x="606" y="230" width="112" height="80" rx="10" fill="white" opacity="0.85"/>
  <rect x="612" y="244" width="60" height="8"  rx="4" fill="#f59e0b" opacity="0.6"/>
  <rect x="612" y="260" width="96" height="6"  rx="3" fill="#fef3c7"/>
  <rect x="612" y="274" width="76" height="6"  rx="3" fill="#fef3c7"/>
  <rect x="612" y="288" width="56" height="16" rx="5" fill="#f59e0b" opacity="0.2"/>

  <!-- Bottom accent -->
  <rect x="280" y="444" width="240" height="6" rx="3" fill="#2563eb" opacity="0.12"/>
  <rect x="340" y="458" width="120" height="6" rx="3" fill="#2563eb" opacity="0.07"/>
</svg>
